name: Post-release PR

on:
  workflow_call:
  workflow_dispatch:

jobs:
  post-release:
    name: Post-release PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Read version
        id: version
        run: |
          version=$(jq -r '.version' custom_components/hamster_mcp/manifest.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check if post-release needed
        id: check
        run: |
          version="${{ steps.version.outputs.version }}"
          if [[ "$version" == *dev* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Version $version is a dev version — skipping post-release"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Create post-release PR
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          version="${{ steps.version.outputs.version }}"
          tag="v$version"
          branch="post-release/$tag"

          # Compute next patch dev version
          IFS='.' read -r major minor patch <<< "$version"
          next_patch=$((patch + 1))
          dev_version="${major}.${minor}.${next_patch}.dev0"

          # Delete existing post-release branch if present (auto-closes any open PR)
          if gh api "repos/$GITHUB_REPOSITORY/git/refs/heads/$branch" &>/dev/null; then
            echo "::notice::Deleting existing branch $branch"
            gh api -X DELETE "repos/$GITHUB_REPOSITORY/git/refs/heads/$branch"
          fi

          # Reset versions to dev
          NEXT_DEV="$dev_version" python3 -c '
          import json, os, re
          from pathlib import Path

          version = os.environ["NEXT_DEV"]

          mp = Path("custom_components/hamster_mcp/manifest.json")
          m = json.loads(mp.read_text())
          m["version"] = version
          m["requirements"] = ["hamster-mcp@git+https://github.com/altendky/hamster-mcp.git@main"]
          mp.write_text(json.dumps(m, indent=2) + "\n")

          pp = Path("pyproject.toml")
          text = pp.read_text()
          text = re.sub(
              r"^version = \".*\"$",
              f"version = \"{version}\"",
              text,
              count=1,
              flags=re.MULTILINE,
          )
          pp.write_text(text)
          '

          uv lock

          # Get current HEAD
          base_sha=$(git rev-parse HEAD)

          # Create branch (pointing at current main HEAD)
          gh api "repos/$GITHUB_REPOSITORY/git/refs" \
            -f ref="refs/heads/$branch" \
            -f sha="$base_sha"

          # Base64-encode modified files to temp files (avoids ARG_MAX)
          base64 -w0 < custom_components/hamster_mcp/manifest.json > "$RUNNER_TEMP/manifest.b64"
          base64 -w0 < pyproject.toml > "$RUNNER_TEMP/pyproject.b64"
          base64 -w0 < uv.lock > "$RUNNER_TEMP/uvlock.b64"

          # Create commit via GraphQL (GitHub signs commits created through this mutation)
          response=$(jq -n \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg branch "$branch" \
            --arg msg "Start ${dev_version} development" \
            --arg head "$base_sha" \
            --rawfile manifest "$RUNNER_TEMP/manifest.b64" \
            --rawfile pyproject "$RUNNER_TEMP/pyproject.b64" \
            --rawfile uvlock "$RUNNER_TEMP/uvlock.b64" \
            '{
              query: "mutation($input: CreateCommitOnBranchInput!) { createCommitOnBranch(input: $input) { commit { oid } } }",
              variables: {
                input: {
                  branch: {
                    repositoryNameWithOwner: $repo,
                    branchName: $branch
                  },
                  message: { headline: $msg },
                  fileChanges: {
                    additions: [
                      {path: "custom_components/hamster_mcp/manifest.json", contents: $manifest},
                      {path: "pyproject.toml", contents: $pyproject},
                      {path: "uv.lock", contents: $uvlock}
                    ]
                  },
                  expectedHeadOid: $head
                }
              }
            }' | gh api graphql --input -)

          commit_sha=$(echo "$response" | jq -r '.data.createCommitOnBranch.commit.oid // empty')

          if [[ -z "$commit_sha" ]]; then
            echo "::error::GraphQL createCommitOnBranch failed"
            echo "$response" | jq '.errors // .data'
            exit 1
          fi

          # Verify the commit is signed
          verified=$(gh api "repos/$GITHUB_REPOSITORY/git/commits/$commit_sha" --jq '.verification.verified')
          if [[ "$verified" != "true" ]]; then
            echo "::error::Commit $commit_sha is not verified — aborting"
            gh api "repos/$GITHUB_REPOSITORY/git/commits/$commit_sha" --jq '.verification'
            exit 1
          fi

          # Create PR
          gh pr create \
            --head "$branch" \
            --title "Post-release: start ${dev_version}" \
            --body "Reset version to \`${dev_version}\` and requirements to \`@main\` after $tag release." \
            --label enqueue
