name: Post-release PR

on:
  workflow_call:
  workflow_dispatch:

jobs:
  post-release:
    name: Post-release PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Read version
        id: version
        run: |
          version=$(jq -r '.version' custom_components/hamster_mcp/manifest.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check if post-release needed
        id: check
        run: |
          version="${{ steps.version.outputs.version }}"
          if [[ "$version" == *dev* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Version $version is a dev version — skipping post-release"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Create post-release PR
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          version="${{ steps.version.outputs.version }}"
          tag="v$version"
          branch="post-release/$tag"

          # Compute next patch dev version
          IFS='.' read -r major minor patch <<< "$version"
          next_patch=$((patch + 1))
          dev_version="${major}.${minor}.${next_patch}.dev0"

          # Delete existing post-release branch if present (auto-closes any open PR)
          if gh api "repos/$GITHUB_REPOSITORY/git/refs/heads/$branch" &>/dev/null; then
            echo "::notice::Deleting existing branch $branch"
            gh api -X DELETE "repos/$GITHUB_REPOSITORY/git/refs/heads/$branch"
          fi

          # Reset versions to dev
          NEXT_DEV="$dev_version" python3 -c '
          import json, os, re
          from pathlib import Path

          version = os.environ["NEXT_DEV"]

          mp = Path("custom_components/hamster_mcp/manifest.json")
          m = json.loads(mp.read_text())
          m["version"] = version
          m["requirements"] = ["hamster-mcp@git+https://github.com/altendky/hamster-mcp.git@main"]
          mp.write_text(json.dumps(m, indent=2) + "\n")

          pp = Path("pyproject.toml")
          text = pp.read_text()
          text = re.sub(
              r"^version = \".*\"$",
              f"version = \"{version}\"",
              text,
              count=1,
              flags=re.MULTILINE,
          )
          pp.write_text(text)
          '

          uv lock

          # Get current HEAD
          base_sha=$(git rev-parse HEAD)

          # Create branch (pointing at current main HEAD)
          gh api "repos/$GITHUB_REPOSITORY/git/refs" \
            -f ref="refs/heads/$branch" \
            -f sha="$base_sha"

          # Create commit via GraphQL (GitHub signs commits created through this mutation).
          # Build the request body in a file so large base64 contents (uv.lock) never
          # pass through shell arguments and hit ARG_MAX.
          GRAPHQL_INPUT="$RUNNER_TEMP/graphql.json" \
          GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
          POST_RELEASE_BRANCH="$branch" \
          POST_RELEASE_MESSAGE="Start ${dev_version} development" \
          POST_RELEASE_HEAD="$base_sha" \
          python3 - <<'PY'
          import base64
          import json
          import os
          from pathlib import Path
          import subprocess

          changed_files = subprocess.run(
              ["git", "diff", "--name-only"],
              check=True,
              capture_output=True,
              text=True,
          ).stdout.splitlines()

          additions = [
              {
                  "path": path,
                  "contents": base64.b64encode(Path(path).read_bytes()).decode(),
              }
              for path in changed_files
          ]

          payload = {
              "query": (
                  "mutation($input: CreateCommitOnBranchInput!) { "
                  "createCommitOnBranch(input: $input) { commit { oid } } }"
              ),
              "variables": {
                  "input": {
                      "branch": {
                          "repositoryNameWithOwner": os.environ["GITHUB_REPOSITORY"],
                          "branchName": os.environ["POST_RELEASE_BRANCH"],
                      },
                      "message": {
                          "headline": os.environ["POST_RELEASE_MESSAGE"],
                      },
                      "fileChanges": {"additions": additions},
                      "expectedHeadOid": os.environ["POST_RELEASE_HEAD"],
                  }
              },
          }

          Path(os.environ["GRAPHQL_INPUT"]).write_text(json.dumps(payload))
          PY

          response=$(gh api graphql --input "$RUNNER_TEMP/graphql.json")

          commit_sha=$(echo "$response" | jq -r '.data.createCommitOnBranch.commit.oid // empty')

          if [[ -z "$commit_sha" ]]; then
            echo "::error::GraphQL createCommitOnBranch failed"
            echo "$response" | jq '.errors // .data'
            exit 1
          fi

          # Verify the commit is signed
          verified=$(gh api "repos/$GITHUB_REPOSITORY/git/commits/$commit_sha" --jq '.verification.verified')
          if [[ "$verified" != "true" ]]; then
            echo "::error::Commit $commit_sha is not verified — aborting"
            gh api "repos/$GITHUB_REPOSITORY/git/commits/$commit_sha" --jq '.verification'
            exit 1
          fi

          # Create PR
          gh pr create \
            --head "$branch" \
            --title "Post-release: start ${dev_version}" \
            --body "Reset version to \`${dev_version}\` and requirements to \`@main\` after $tag release." \
            --label enqueue
