name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  pre-commit:
    uses: ./.github/workflows/reflow-pre-commit.yml

  python:
    uses: ./.github/workflows/reflow-python.yml

  validate:
    uses: ./.github/workflows/validate.yml

  ci:
    if: ${{ !cancelled() }}
    needs: [pre-commit, python, validate]
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether all CI checks passed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          jobs: ${{ toJSON(needs) }}

  tag-release:
    if: github.ref == 'refs/heads/main'
    needs: [ci]
    uses: ./.github/workflows/reflow-tag-release.yml
    secrets: inherit

  publish-release:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: [ci]
    uses: ./.github/workflows/reflow-publish-release.yml
    permissions:
      contents: write
    secrets: inherit

  checks:
    name: all
    if: ${{ !cancelled() }}
    needs: [ci, tag-release, publish-release]
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether all jobs passed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          allowed-skips: tag-release, publish-release
          jobs: ${{ toJSON(needs) }}
