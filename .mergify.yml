queue_rules:
  - name: default
    branch_protection_injection_mode: queue
    queue_conditions:
      - label = enqueue
      - base = main
      - -draft
    merge_method: merge
    checks_timeout: 90 min
    max_checks_retries: 2

merge_queue:
  max_parallel_checks: 1

pull_request_rules:
  - name: Queue enqueue PRs
    conditions:
      - base = main
      - label = enqueue
      - -draft
    actions:
      queue:
        name: default

  - name: Automatically approve Renovate PRs
    conditions:
      - author = altendky-renovate[bot]
    actions:
      review:
        type: APPROVE

  - name: Automatically approve post-release PRs
    conditions:
      - author = altendky-release[bot]
      - head~=post-release/
    actions:
      review:
        type: APPROVE

merge_protections_settings:
  reporting_method: deployments
