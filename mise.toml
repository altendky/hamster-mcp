[tools]
# Match the Python version required by the latest stable Home Assistant
# release (2026.3.x requires Python 3.14).
python = "3.14"
uv = "latest"
"pipx:pre-commit" = "4.5.1"
# Provides cargo-binstall so the cargo backend can download pre-built binaries
# instead of compiling from source.
cargo-binstall = "latest"
# lychee uses the cargo backend with binstall support so that pre-built binaries
# are downloaded where available (Linux, Windows x64, macOS ARM64), and source
# compilation is used as a fallback on platforms without pre-built binaries
# (macOS Intel). The lychee project dropped macOS Intel binaries after v0.15.1
# (April 2024), so the aqua backend cannot cover all CI platforms.
"cargo:lychee" = "0.23.0"

[settings]
# Auto-create and activate a .venv managed by uv.
python.uv_venv_auto = "create|source"

[env]
# Ensure uv uses the mise-managed Python interpreter, not a system one.
UV_PYTHON = { value = "{{ tools.python.path }}", tools = true }

[tasks.generate-icons]
description = "Generate brand icons from source SVG"
run = "python brand/generate.py"

[tasks.release]
description = "Prepare a release PR"
run = "python scripts/release.py"
